# =============================================================================
# OpenTelemetry Collector Helm Chart — values.yaml
# =============================================================================
# Chart:   open-telemetry/opentelemetry-collector
# Docs:    https://artifacthub.io/packages/helm/opentelemetry-helm/opentelemetry-collector
# Purpose: Scrape MongoDB exporter metrics and forward them for observability
# =============================================================================

# ── Deployment Mode ──────────────────────────────────────────────────────────
# "deployment" is suitable for a centralized collector that receives/scrapes.
# Use "daemonset" if you want per-node collection (not needed here).
mode: deployment

# ── Replicas ─────────────────────────────────────────────────────────────────
replicaCount: 1

# ── Resources ────────────────────────────────────────────────────────────────
# Collector resources — adjust based on scrape volume.
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 256Mi

# ── Collector Configuration ─────────────────────────────────────────────────
# This block maps directly to the OTel Collector's config.yaml.
# It defines receivers, processors, exporters, and service pipelines.
config:
  # ── Receivers ────────────────────────────────────────────────────────────
  receivers:
    # OTLP receiver (kept for future trace/metric ingestion from app services)
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Prometheus receiver — scrapes the MongoDB exporter sidecar.
    # Uses static_configs targeting each StatefulSet pod's stable DNS name.
    # The Bitnami MongoDB chart creates pods named: mongodb-0, mongodb-1, mongodb-2
    # The headless service is: mongodb-headless.fit-forge.svc.cluster.local
    prometheus:
      config:
        scrape_configs:
          # ── MongoDB Exporter Metrics ───────────────────────────────────
          - job_name: "mongodb-exporter"
            scrape_interval: 15s
            scrape_timeout: 10s
            metrics_path: /metrics

            # Static targets for all 3 MongoDB replica set members.
            # Port 9216 is the default MongoDB exporter port enabled by
            # metrics.enabled=true in the Bitnami values.
            static_configs:
              - targets:
                  - "mongodb-0.mongodb-headless.fit-forge.svc.cluster.local:9216"
                  - "mongodb-1.mongodb-headless.fit-forge.svc.cluster.local:9216"
                  - "mongodb-2.mongodb-headless.fit-forge.svc.cluster.local:9216"
                labels:
                  cluster: "fitforge"
                  database: "mongodb"
                  environment: "production"

          # ── OTel Collector Self-Metrics ────────────────────────────────
          # The collector exposes its own internal metrics on port 8888.
          - job_name: "otel-collector"
            scrape_interval: 30s
            static_configs:
              - targets: ["localhost:8888"]

  # ── Processors ───────────────────────────────────────────────────────────
  processors:
    # Memory limiter prevents OOM by checking memory usage periodically.
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    # Batch processor groups data before export to reduce overhead.
    batch:
      send_batch_size: 1024
      timeout: 5s

    # Resource processor adds metadata attributes to all telemetry.
    resource:
      attributes:
        - key: service.namespace
          value: fit-forge
          action: insert
        - key: deployment.environment
          value: production
          action: insert

  # ── Exporters ────────────────────────────────────────────────────────────
  exporters:
    # Debug/logging exporter — prints metrics to stdout for testing.
    # Set verbosity to "detailed" to see full metric payloads in logs.
    # Switch to "basic" or remove in production.
    debug:
      verbosity: detailed

    # ── Future: Add a real exporter here ──────────────────────────────
    # Example: Prometheus remote-write to Grafana Cloud
    # prometheusremotewrite:
    #   endpoint: "https://prometheus-prod-xx.grafana.net/api/prom/push"
    #   headers:
    #     Authorization: "Bearer <token>"

  # ── Service Pipelines ────────────────────────────────────────────────────
  # Defines how data flows: receivers → processors → exporters
  service:
    pipelines:
      # ── Metrics Pipeline ──────────────────────────────────────────────
      # Collects MongoDB + self metrics → processes → logs to stdout
      metrics:
        receivers:
          - otlp
          - prometheus
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - debug

    # ── Telemetry ────────────────────────────────────────────────────────
    # Internal observability of the collector itself.
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

# ── Ports ────────────────────────────────────────────────────────────────────
# Expose the necessary ports on the collector service.
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
