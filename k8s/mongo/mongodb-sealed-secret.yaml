# =============================================================================
# SealedSecret: mongodb-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# This resource is created by running kubeseal against mongodb-secret.yaml.
# The Sealed Secrets controller in the cluster decrypts it and creates the
# corresponding Kubernetes Secret automatically.
#
# How to generate this file:
#   kubeseal --format yaml \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace kube-system \
#     < k8s/mongo/mongodb-secret.yaml \
#     > k8s/mongo/mongodb-sealed-secret.yaml
#
# After generating, delete mongodb-secret.yaml immediately.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-secret
  namespace: fit-forge
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
spec:
  encryptedData:
    # ── These values are placeholders ──────────────────────────────────────────
    # After running kubeseal, they will be replaced with encrypted base64 blobs.
    mongodb-root-password: ""
    mongodb-passwords: ""
    mongodb-metrics-password: ""
    mongodb-replica-set-key: ""
  template:
    metadata:
      name: mongodb-secret
      namespace: fit-forge
      labels:
        app.kubernetes.io/part-of: fitforge
        app.kubernetes.io/component: database
    type: Opaque
