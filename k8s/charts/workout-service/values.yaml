# Default values for workout-service.

replicaCount: 1

image:
  repository: aswin018/k8s_mern_app_workout-service
  pullPolicy: Always
  tag: "v3"

# Resources configured for Guaranteed QoS
resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "300Mi"

service:
  type: ClusterIP
  port: 5003

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

