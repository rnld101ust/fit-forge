# Default values for nutrition-service.

replicaCount: 1

image:
  repository: aswin018/k8s_mern_app_nutrition-service
  pullPolicy: Always
  tag: "v3"

# Resources configured for Guaranteed QoS
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "300m"
    memory: "300Mi"

service:
  type: ClusterIP
  port: 5004
  targetPort: 5004

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

