name: CI — Frontend

on:
  push:
    branches:
      - feature/frontend-login-resources
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/_ci-template.yml"

  pull_request:
    branches:
      - main-features
    paths:
      - "frontend/**"

jobs:
  ci:
    uses: ./.github/workflows/_ci-template.yml
    with:
      service-name: frontend
      service-path: frontend
      runtime: node
      node-version: "20"
      environment: dev   
    secrets: inherit